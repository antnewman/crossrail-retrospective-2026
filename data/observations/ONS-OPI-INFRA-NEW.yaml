pre_2014_gap_note: >
  This series begins 2014-01 (ONS current 2015=100 base). Pre-2014 values
  are held in the superseded BIS OPI series with ONS-published linking
  factors. For reprice of assumptions with pre-2014 baseline dates (for
  example, the 2011 Crossrail baseline), the BIS linked series must be
  applied at drift-calculation time. See methodology.md section 6.1 and
  caveat 1.

