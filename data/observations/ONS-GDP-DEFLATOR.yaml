# Observations for series ONS-GDP-DEFLATOR
# HM Treasury GDP deflator at market prices, annual outturn, fiscal years 1955-56 to 2024-25
# Each entry maps to one row in pda_shared.external_observations

series_code: ONS-GDP-DEFLATOR
unit: index_reference_year_varies
frequency: annual
observation_date_convention: end-of-fiscal-year
index_base_year_at_load: "2024-25 = 100"

source:
  publication: "HMT GDP Deflators at market prices, and money GDP (Quarterly National Accounts update, March 2026)"
  release_date: 2026-03-31
  workbook: GDP_Deflators_Qtrly_National_Accounts_March_2026_update.xlsx
  workbook_url: "https://assets.publishing.service.gov.uk/media/69cbaf242d120d9d5ec0f2fd/GDP_Deflators_Qtrly_National_Accounts_March_2026_update.xlsx"
  publication_page: "https://www.gov.uk/government/statistics/gdp-deflators-at-market-prices-and-money-gdp-march-2026-quarterly-national-accounts"
  collection_page: "https://www.gov.uk/government/collections/gdp-deflators-at-market-prices-and-money-gdp"
  sheet: "31032026 deflator update"
  column: "GDP deflator at market prices, 2024-25 = 100"
  outturn_upstream: "ONS Quarterly National Accounts"

rebase_caveat: >
  HMT rebases this deflator on every release. Values here are stored at load
  time with the 2024-25 = 100 base. Any analysis against these values must
  confirm the current base year at the time of use, because HMT rebases on
  every release and values here will become out of date as new releases
  happen. The simplest check is to fetch the current HMT release and
  compare the 2024-25 index value to 100; if different, a rebasing has
  occurred and the load should be refreshed as a new append-only entry.

scope_note: >
  70 outturn annual rows loaded, fiscal years 1955-56 through 2024-25.
  The 6 forecast rows in the workbook (2025-26 through 2030-31) carry
  a dash "-" in the deflator index column because the HMT workbook
  only publishes forecast money GDP (from OBR EFO Spring Statement
  3 March 2026), not a forecast deflator index. Forecasts not loaded
  here; if needed, load under OBR-EFO-2026-03 or a successor series.

role_in_investigation: >
  Ancillary sanity-check series for the construction cost reprice
  (methodology.md section 6.1, caveat 1). Not the primary reprice basis;
  that role is filled by ONS-OPI-INFRA-NEW.

