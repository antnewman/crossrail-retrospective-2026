# Observations for series BOE-BASERATE
# Bank of England official Bank Rate, event-driven
# Each entry maps to one row in pda_shared.external_observations
# This series is shared with the mtd_2026 investigation; one load serves both cases

series_code: BOE-BASERATE
unit: percent
frequency: event_driven
observation_date_convention: rate-change effective date (first day the new rate applies)
event_driven_semantics: >
  Each row's value persists from observation_date until the day before the
  observation_date of the next row. The current (most recent) row's rate
  continues until a subsequent MPC decision is loaded as a new row with a
  later captured_at.

source:
  publication: "BoE IADB (Interactive Statistical Database)"
  series_identifier: IUDBEDR
  export_url: "https://www.bankofengland.co.uk/boeapps/iadb/fromshowcolumns.asp?csv.x=yes&Datefrom=01/Jan/2000&Dateto=30/Apr/2026&SeriesCodes=IUDBEDR&UsingCodes=Y&VPD=Y&VFD=N"
  human_readable_page: "https://www.bankofengland.co.uk/monetary-policy/the-interest-rate-bank-rate"
  export_date: 2026-04-21
  raw_response_shape: "daily, 6644 rows from 2000-01-04 to 2026-04-20"
  filter_applied: "rate-change events only (edges of the step function), 57 of 6644 rows retained"

role_in_investigation: >
  Discount rate sensitivity for the BCR restatement (methodology.md
  section 6.5). Ancillary rather than primary.

